<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecLAB Centralized Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;800;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #020617 100%);
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .glass {
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.6) 0%, rgba(2, 6, 23, 0.9) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass:hover {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 35px 60px -12px rgba(59, 130, 246, 0.2);
            transform: translateY(-5px);
        }

        .nav-item {
            position: relative;
            overflow: hidden;
            background: transparent;
            font-weight: 500;
            letter-spacing: 0.025em;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #3b82f6;
            transform: scaleY(0);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            transform-origin: center;
            border-radius: 0 4px 4px 0;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        }

        .nav-item:hover {
            background: rgba(59, 130, 246, 0.05);
            color: white;
            padding-left: 1.25rem;
        }

        .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, transparent 100%);
            color: #60a5fa;
            font-weight: 800;
        }

        .nav-item.active::before {
            transform: scaleY(0.7);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(51, 65, 85, 0.6);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.8);
        }

        /* Vibrant Text gradients */
        .text-gradient {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pulse-subtle {
            animation: pulse-border 3s infinite ease-in-out;
        }

        @keyframes pulse-border {
            0% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.2);
            }

            50% {
                box-shadow: 0 0 0 8px rgba(59, 130, 246, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }
    </style>
</head>

<body class="h-screen flex text-sm">

    <!-- SIDEBAR -->
    <nav
        class="w-68 bg-black/40 backdrop-blur-xl border-r border-slate-800/50 flex flex-col p-6 z-10 shadow-2xl shadow-indigo-500/10">
        <div class="mb-12 px-2 flex items-center gap-4">
            <div
                class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 via-indigo-600 to-violet-700 flex items-center justify-center shadow-[0_8px_25px_rgba(59,130,246,0.4)] pulse-subtle relative overflow-hidden group">
                <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <i data-lucide="shield-check" class="w-6 h-6 text-white relative z-10"></i>
            </div>
            <div>
                <span class="font-black text-2xl text-white tracking-tighter block leading-none mb-1">SecLAB<span
                        class="text-blue-500">.</span></span>
                <span
                    class="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] block opacity-80">Autonomous
                    Core</span>
            </div>
        </div>

        <div class="space-y-1.5 flex-1">
            <button onclick="router.go('dashboard')" id="btn-dashboard"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
            </button>
            <button onclick="router.go('vulnerabilities')" id="btn-vulnerabilities"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="shield-alert" class="w-4 h-4"></i> Vulnerabilities
            </button>
            <button onclick="router.go('patch-lab')" id="btn-patch-lab"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="wrench" class="w-4 h-4"></i> Patch Lab
            </button>
            <button onclick="router.go('decision-tree')" id="btn-decision-tree"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="git-branch" class="w-4 h-4"></i> Decision Tree
            </button>
            <button onclick="router.go('system-core')" id="btn-system-core"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="cpu" class="w-4 h-4"></i> System Core
            </button>
            <button onclick="router.go('compliance')" id="btn-compliance"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="clipboard-check" class="w-4 h-4"></i> Compliance
            </button>
            <button onclick="router.go('feedback')" id="btn-feedback"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="message-square" class="w-4 h-4"></i> Feedback
            </button>
            <div class="my-4 h-px bg-slate-800/30"></div>
            <button onclick="router.go('terminal')" id="btn-terminal"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="terminal" class="w-4 h-4"></i> Terminal
            </button>
            <button onclick="router.go('website-scanner')" id="btn-website-scanner"
                class="nav-item w-full text-left px-4 py-3.5 rounded-xl text-slate-400 transition-all duration-300 flex items-center gap-3">
                <i data-lucide="globe" class="w-4 h-4"></i> Website Scanner
            </button>
        </div>
    </nav>

    <!-- CONTENT -->
    <main
        class="flex-1 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] relative flex flex-col items-stretch z-0">
        <div class="absolute inset-0 bg-slate-950/80 z-[-1]"></div>
        <div class="absolute inset-x-0 top-0 h-96 bg-gradient-to-b from-indigo-900/10 to-transparent z-[-1]"></div>
        <header
            class="h-20 border-b border-white/5 flex items-center justify-between px-10 bg-black/20 backdrop-blur-md">
            <h2 id="page-title" class="text-2xl font-black text-white flex items-center gap-3 tracking-tight">
                Dashboard
            </h2>
            <div class="flex items-center gap-6">
                <div
                    class="px-3 py-1.5 rounded-full bg-slate-800/50 border border-slate-700/50 flex items-center gap-2">
                    <span
                        class="block w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse"></span>
                    <span class="text-[10px] font-bold tracking-widest text-slate-300 uppercase">System Active</span>
                </div>
            </div>
        </header>

        <div id="viewport" class="p-8 overflow-y-auto flex-1">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script>
        // Dynamic API URL - works on both localhost and Render
        const API_URL = window.location.origin;

        const pipelineState = {
            scanId: null,
            vulnerabilities: [],
            metrics: {},
            metricsHistory: [],
            systemCore: {},
            complianceData: {},
            feedbackData: {},
            terminalLogs: [],
            pipelineLogs: [], // Initialized for Automation Kernel
            scanLastIndex: 0, // Initialized for Delta Sync
            pipeLastIndex: 0, // Initialized for Delta Sync
            availableWebsites: [],
            currentScanId: 'default',
            scanStatus: 'COMPLETED',
            activeVulnId: null,
            queuingActive: false,

            async fetchAll() {
                try {
                    const [vulns, dash, comp, core, sites, pipe, feedbackRes] = await Promise.all([
                        fetch(`${API_URL}/vulnerabilities`).then(r => r.ok ? r.json() : this.vulnerabilities),
                        fetch(`${API_URL}/dashboard`).then(r => r.ok ? r.json() : this.metrics),
                        fetch(`${API_URL}/compliance`).then(r => r.ok ? r.json() : this.complianceData),
                        fetch(`${API_URL}/system-core`).then(r => r.ok ? r.json() : this.systemCore),
                        fetch(`${API_URL}/available-websites`).then(r => r.ok ? r.json() : { websites: this.availableWebsites }),
                        fetch(`${API_URL}/pipeline/status`).then(r => r.ok ? r.json() : { paused: this.paused, active: this.activeJob, queuing_active: this.queuingActive, queue: this.queue }),
                        fetch(`${API_URL}/feedback`).then(r => r.ok ? r.json() : this.feedbackData)
                    ]);

                    this.vulnerabilities = (vulns && Array.isArray(vulns)) ? vulns : (Array.isArray(this.vulnerabilities) ? this.vulnerabilities : []);
                    this.metrics = (dash && typeof dash === 'object' && !dash.detail) ? dash : this.metrics;
                    if (dash) {
                        this.metricsHistory.push({ time: Date.now(), ...dash });
                        if (this.metricsHistory.length > 50) this.metricsHistory.shift();
                    }
                    this.complianceData = comp || this.complianceData;
                    this.feedbackData = feedbackRes || this.feedbackData;
                    this.systemCore = core || this.systemCore;
                    this.availableWebsites = sites.websites || this.availableWebsites || [];

                    if (pipe) {
                        this.paused = pipe.paused;
                        this.activeJob = pipe.active;
                        this.queuingActive = pipe.queuing_active;
                        this.queue = Array.isArray(pipe.queue) ? pipe.queue : (this.queue || []);
                    }
                    const oldQueueCount = this.queueCount || 0;
                    this.queueCount = this.queue.length;

                    // Trigger Success Pop-up when queue clears
                    if (oldQueueCount > 0 && this.queueCount === 0 && !pipelineState.paused) {
                        app.showAutomationSuccessPopup();
                    }

                    // PERSISTENCE: Save state for reload stability
                    localStorage.setItem('seclab_current_scan_id', this.currentScanId);
                    localStorage.setItem('seclab_active_vuln_id', this.activeVulnId);
                    localStorage.setItem('seclab_terminal_logs', JSON.stringify(this.terminalLogs || []));
                    localStorage.setItem('seclab_pipeline_logs', JSON.stringify(this.pipelineLogs || []));
                    localStorage.setItem('seclab_scan_last_index', this.scanLastIndex.toString());
                    localStorage.setItem('seclab_pipe_last_index', this.pipeLastIndex.toString());

                    app.smartUpdate();
                } catch (e) { console.error("Sync Error", e); }
            },

            async fetchWebsites() {
                try {
                    const res = await fetch(`${API_URL}/available-websites`);
                    const data = await res.json();
                    this.availableWebsites = data.websites || [];
                    if (router.current === 'website-scanner') app.render(true);
                } catch (e) { console.error("Websites Fetch Error", e); }
            },

            async fetchTerminal() {
                try {
                    const scanIndex = this.scanLastIndex || 0;
                    const autoIndex = this.pipeLastIndex || 0;

                    const res = await fetch(`${API_URL}/terminal-stream/${this.currentScanId}?last_scanner_index=${scanIndex}&last_automation_index=${autoIndex}`);
                    if (!res.ok) return; // Prevent parsing errors on DB lock (500)
                    const data = await res.json();

                    // Append logs
                    if (data.new_scanner_logs && data.new_scanner_logs.length > 0) {
                        this.terminalLogs = (this.terminalLogs || []).concat(data.new_scanner_logs);
                        this.scanLastIndex = data.last_scanner_index;
                        this.scanHasNewLogs = true; // Signal for DOM update
                    } else {
                        this.scanHasNewLogs = false;
                    }

                    if (data.new_automation_logs && data.new_automation_logs.length > 0) {
                        this.pipelineLogs = (this.pipelineLogs || []).concat(data.new_automation_logs);
                        this.pipeLastIndex = data.last_automation_index;
                        this.pipeHasNewLogs = true; // Signal for DOM update
                    } else {
                        this.pipeHasNewLogs = false;
                    }

                    const oldStatus = this.scanStatus;
                    this.scanStatus = data.status || 'COMPLETED';

                    // Scan completion notification (automation starts automatically on backend)
                    if (oldStatus === 'RUNNING' && this.scanStatus === 'COMPLETED' && !this.scanFinishedFlag) {
                        this.scanFinishedFlag = true;
                        if (data.found_count > 0) {
                            app.showToast(`✅ Scan Complete. Automation pipeline started for ${data.found_count} vulnerabilities`, 'emerald');
                            // Automatically switch the UI to the pipeline log mode since it's fully autonomous now!
                            app.switchTerminalMode('pipeline');
                        }
                    }

                    // Only trigger render update if there are new logs to minimize reflows
                    if (router.current === 'terminal' && (this.scanHasNewLogs || this.pipeHasNewLogs)) {
                        app.renderTerminalOnly();
                    }
                } catch (e) { console.error("Terminal Sync Error", e); }
            },

            async startPipeline() {
                try {
                    await fetch(`${API_URL}/pipeline/start`, { method: 'POST' });
                    this.paused = false;
                    app.render();
                } catch (e) { console.error("Start Pipeline Failed", e); }
            },


            async generatePatch(id) {
                try {
                    await fetch(`${API_URL}/patch/${id}`, { method: 'POST' });
                    const vuln = this.vulnerabilities.find(v => v.id === id);
                    if (vuln) vuln.status = "PATCHED";
                    await this.fetchAll();
                    router.go('patch-lab');
                    this.activeVulnId = id;
                } catch (e) { console.error("Patch Failed", e); }
            },

            async validatePatch(id) {
                try {
                    await fetch(`${API_URL}/validate/${id}`, { method: 'POST' });
                    const vuln = this.vulnerabilities.find(v => v.id === id);
                    if (vuln) {
                        vuln.status = "VALIDATED";
                        vuln.risk_score = 0;
                    }
                    await this.fetchAll();
                    alert("Patch validated successfully!");
                    router.go('decision-tree');
                } catch (e) { console.error("Validation Failed", e); }
            }
        };

        const router = {
            current: 'dashboard',
            go(page) {
                this.current = page;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`btn-${page}`).classList.add('active');

                const titles = {
                    'dashboard': 'Security Dashboard',
                    'vulnerabilities': 'Vulnerability Registry',
                    'patch-lab': 'Patch Lab',
                    'decision-tree': 'Decision Tree',
                    'system-core': 'System Core',
                    'compliance': 'Compliance',
                    'feedback': 'Feedback',
                    'terminal': 'Terminal',
                    'website-scanner': 'Website Scanner'
                };
                document.getElementById('page-title').innerText = titles[page];
                app.render();
            }
        };

        const app = {
            terminalMode: 'scan',
            lastPage: null, // Track page for stability

            init() {
                // Restore state from persistence
                this.currentScanId = localStorage.getItem('seclab_current_scan_id') || 'default';
                this.activeVulnId = localStorage.getItem('seclab_active_vuln_id') || null;
                pipelineState.currentScanId = this.currentScanId;
                pipelineState.activeVulnId = this.activeVulnId;
                
                // Restore logs
                try {
                    pipelineState.terminalLogs = JSON.parse(localStorage.getItem('seclab_terminal_logs') || '[]');
                    pipelineState.pipelineLogs = JSON.parse(localStorage.getItem('seclab_pipeline_logs') || '[]');
                    pipelineState.scanLastIndex = parseInt(localStorage.getItem('seclab_scan_last_index') || '0');
                    pipelineState.pipeLastIndex = parseInt(localStorage.getItem('seclab_pipe_last_index') || '0');
                } catch(e) { console.warn("Log restoration failed", e); }

                router.go('dashboard');
                pipelineState.fetchAll(); // Fetch data immediately
                pipelineState.fetchWebsites();

                // Start live sync - Heartbeat polling
                setInterval(() => {
                    pipelineState.fetchAll();
                    // Always poll terminal if a scan is running (for notifications) 
                    // or if currently viewing terminal
                    if (router.current === 'terminal' || pipelineState.scanStatus === 'RUNNING' || pipelineState.queuingActive) {
                        pipelineState.fetchTerminal();
                    }
                }, 500);
            },

            async executeScan() {
                document.getElementById('page-title').innerText = "Scanning filesystem...";
                await pipelineState.executeScan();
            },

            async scanWebsite(url) {
                if (!url) {
                    alert('Please enter a target URL.');
                    return;
                }
                // Automatically prepend https:// if the user forgets it
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }

                console.log("[ACTION] Custom Website Scan:", url);
                try {
                    const res = await fetch(`${API_URL}/scan-website`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url })
                    });
                    if (!res.ok) {
                        const errorText = await res.text();
                        throw new Error(errorText || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    pipelineState.currentScanId = data.scan_id;
                    pipelineState.scanStatus = 'RUNNING';
                    pipelineState.scanFinishedFlag = false;
                    app.terminalMode = 'scan';
                    router.go('terminal');
                    pipelineState.fetchTerminal();
                } catch (e) {
                    console.error("Custom Scan Failed", e);
                    alert(`Failed to start scan: ${e.message}`);
                }
            },

            async scanPredefinedWebsite(id) {
                console.log("[ACTION] Predefined Scan:", id);
                try {
                    const res = await fetch(`${API_URL}/initialize-audit/${id}`, { method: 'POST' });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                    pipelineState.currentScanId = data.scan_id;
                    pipelineState.scanStatus = 'RUNNING';
                    pipelineState.scanFinishedFlag = false;
                    app.terminalMode = 'scan';
                    router.go('terminal');
                    pipelineState.fetchTerminal();
                } catch (e) {
                    console.error("Predefined Scan Failed", e);
                    alert(`Failed to start scan: ${e.message}`);
                }
            },

            async executiveScan() {
                console.log("[ACTION] Executive Scan Started");
                try {
                    const res = await fetch(`${API_URL}/executive-scan`, { method: 'POST' });
                    if (!res.ok) {
                        const errorText = await res.text();
                        throw new Error(errorText || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    pipelineState.currentScanId = data.scan_id;
                    pipelineState.scanStatus = 'RUNNING';
                    pipelineState.scanLastIndex = 0;
                    pipelineState.pipeLastIndex = 0;
                    pipelineState.terminalLogs = [];
                    pipelineState.pipelineLogs = [];
                    pipelineState.scanFinishedFlag = false; // Reset flag for popup
                    // Always go to terminal Scanner Logic tab
                    app.terminalMode = 'scan';
                    app.lastPage = null; // Force re-render
                    router.go('terminal');
                } catch (e) {
                    console.error("Executive Scan Failed", e);
                    alert(`Executive Scan Failed: ${e.message}`);
                }
            },

            async generatePatch(id) {
                await pipelineState.generatePatch(id);
            },

            async validatePatch(id) {
                await pipelineState.validatePatch(id);
            },

            async submitFeedback(id) {
                const comment = prompt("Enter comments for this patch:");
                if (comment) {
                    try {
                        await fetch(`${API_URL}/feedback/${id}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ rating: 5, comment: comment })
                        });
                        this.showToast("Feedback Submitted!", 'emerald');
                        await pipelineState.fetchAll();
                        if (router.current === 'feedback') {
                            this.renderFeedback(document.getElementById('viewport'));
                        }
                    } catch (e) {
                        this.showToast("Failed to submit feedback", 'rose');
                    }
                }
            },

            render(isUpdate = false) {
                const viewport = document.getElementById('viewport');
                const page = router.current;

                // For full page transitions, only clear if we actually changed pages
                if (!isUpdate && this.lastPage !== page) {

                    // Add smooth fade out effect
                    viewport.style.transition = 'opacity 0.15s ease-out';
                    viewport.style.opacity = '0';

                    setTimeout(() => {
                        viewport.innerHTML = '';
                        if (page === 'dashboard') this.renderDashboard(viewport);
                        else if (page === 'vulnerabilities') this.renderVulns(viewport);
                        else if (page === 'patch-lab') this.renderPatchLab(viewport);
                        else if (page === 'decision-tree') this.renderTree(viewport);
                        else if (page === 'system-core') this.renderSystem(viewport);
                        else if (page === 'compliance') this.renderCompliance(viewport);
                        else if (page === 'feedback') this.renderFeedback(viewport);
                        else if (page === 'terminal') this.renderTerminal(viewport);
                        else if (page === 'website-scanner') this.renderWebsiteScanner(viewport);

                        this.lastPage = page;

                        // Yield to browser paint before calculating heavy SVG icon DOM conversions
                        requestAnimationFrame(() => {
                            lucide.createIcons();
                            // Fade back in
                            viewport.style.opacity = '1';
                        });
                    }, 150);

                } else {
                    // Targeted Dynamic Updates
                    if (page === 'dashboard') this.updateDashboardDynamic(viewport);
                    else if (page === 'vulnerabilities') this.updateVulnsDynamic(viewport);
                    else if (page === 'terminal') this.updateTerminalLogs();
                    else if (page === 'decision-tree') this.updateTreeDynamic(viewport);
                    else if (page === 'system-core') this.updateSystemDynamic(viewport);
                    else if (page === 'compliance') this.updateComplianceDynamic(viewport);
                    else if (page === 'patch-lab') this.updatePatchLabDynamic(viewport);
                    else if (page === 'website-scanner') {
                        this.updateWebsiteScannerDynamic(viewport);
                    }
                }

                this.renderGlobalOverlays();
            },

            showIntelligenceHUD(id) {
                const v = pipelineState.vulnerabilities.find(item => item.id === id);
                if (!v) return;

                const overlay = document.createElement('div');
                overlay.id = 'intel-hud-overlay';
                overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center p-8 bg-black/80 backdrop-blur-md animate-in fade-in duration-300';

                overlay.innerHTML = `
                    <div class="glass w-full max-w-5xl rounded-[40px] border border-blue-500/30 shadow-[0_0_100px_rgba(59,130,246,0.2)] flex flex-col overflow-hidden max-h-[85vh]">
                        <div class="p-8 border-b border-white/10 flex justify-between items-center bg-gradient-to-r from-blue-900/10 to-transparent">
                            <div>
                                <h2 class="text-3xl font-black text-white tracking-tighter uppercase italic flex items-center gap-4">
                                    <i data-lucide="brain-circuit" class="w-8 h-8 text-blue-400"></i>
                                    Technical Intelligence HUD
                                </h2>
                                <p class="text-[10px] text-slate-500 font-bold tracking-[0.3em] uppercase mt-2">Neural Analysis for Threat Vector: <span class="text-blue-500 italic">${v.id}</span></p>
                            </div>

            updateProgressBar() {
                const vulns = pipelineState.vulnerabilities;
                // Count ALL vulnerabilities regardless of status
                const total = vulns.length;
                const fixed = vulns.filter(v => v.status === 'FIXED').length;

                const percent = total > 0 ? Math.round((fixed / total) * 100) : 0;

                const bar = document.getElementById('pipeline-progress-bar');
                const labelLarge = document.getElementById('pipeline-percent-large');
                if (bar) bar.style.width = `${percent}%`;
                if (labelLarge) labelLarge.innerText = `${percent}%`;

                const status = document.getElementById('pipeline-mini-status');
                const taskContainer = document.getElementById('pipeline-active-task-container');
                const taskUrl = document.getElementById('pipeline-active-url');

                if (status) {
                    const activeVuln = vulns.find(v => ['QUEUED_FOR_PATCH', 'PATCH_GENERATING', 'PATCH_APPLIED', 'VALIDATING'].includes(v.status));
                    const isJobActive = !!activeVuln;

                    status.className = `text-[11px] font-black px-6 py-2 rounded-full border uppercase tracking-[0.3em] transition-all duration-500 ${isJobActive || pipelineState.queuingActive ? 'border-blue-500 text-blue-400 bg-blue-900/30 shadow-[0_0_30px_rgba(59,130,246,0.4)] animate-pulse' : 'border-slate-800 text-slate-500 bg-slate-900/50'}`;
                    status.innerText = pipelineState.queuingActive ? 'REGISTRY INGESTION' : (isJobActive ? 'REMEDIATION IN PROGRESS' : 'ENGINE IDLE');

                    if (taskContainer && taskUrl) {
                        if (isJobActive) {
                            taskContainer.style.display = 'block';
                            taskUrl.innerText = `${activeVuln.url || 'LOCAL ENDPOINT'} -> [${activeVuln.vulnerability_type}]`;

                            // Update phase steps
                            const s = activeVuln.status;
                            const steps = {
                                'QUEUED_FOR_PATCH': 1,
                                'PATCH_GENERATING': 2,
                                'PATCH_APPLIED': 3,
                                'VALIDATING': 3,
                                'FIXED': 4,
                                'FAILED': 4
                            };
                            const currentStep = steps[s] || 1;

                            for (let i = 1; i <= 4; i++) {
                                const el = document.getElementById(`phase-step-${i}`);
                                if (!el) continue;
                                const icon = el.querySelector('i, svg');
                                if (i < currentStep) {
                                    el.className = 'flex flex-col items-center gap-3 p-4 rounded-2xl bg-emerald-500/10 border border-emerald-500/30 opacity-100 shadow-[0_0_20px_rgba(16,185,129,0.1)] transition-all duration-500';
                                    if (icon) icon.className.baseVal = 'lucide lucide-check-circle-2 w-5 h-5 text-emerald-400';
                                } else if (i === currentStep) {
                                    el.className = 'flex flex-col items-center gap-3 p-4 rounded-2xl bg-blue-600/20 border border-blue-500/50 opacity-100 shadow-[0_0_25px_rgba(59,130,246,0.3)] animate-pulse transition-all duration-500';
                                    if (icon) icon.className.baseVal = 'lucide lucide-cpu w-5 h-5 text-blue-400 animate-bounce';
                                } else {
                                    el.className = 'flex flex-col items-center gap-3 p-4 rounded-2xl bg-white/5 border border-white/5 opacity-30 transition-all duration-500';
                                    if (icon) icon.className.baseVal = `lucide w-5 h-5 ${i === 2 ? 'text-indigo-400' : i === 3 ? 'text-emerald-400' : i === 4 ? 'text-white' : 'text-blue-400'}`;
                                }
                            }
                        } else if (pipelineState.queuingActive) {
                            taskContainer.style.display = 'block';
                            taskUrl.innerHTML = `<span class="text-blue-400 font-bold italic tracking-wider animate-pulse uppercase text-[10px]">Registry Ingestion Active:</span> <span class="text-slate-400">Processing discovered vulnerabilities...</span>`;

                            // Highlight Phase 1 during ingestion
                            for (let i = 1; i <= 4; i++) {
                                const el = document.getElementById(`phase-step-${i}`);
                                if (!el) continue;
                                if (i === 1) {

            updateTerminalLogs() {
                const terminalBody = document.getElementById('terminal-logs-body');
                if (!terminalBody) return;

                const logsSource = (router.currentTerminalMode === 'pipeline')
                    ? pipelineState.pipelineLogs
                    : pipelineState.terminalLogs;

                if (!logsSource || !Array.isArray(logsSource)) return;

                // Ensure app.renderedLogIndices is initialized for the current mode
                if (!app.renderedLogIndices) app.renderedLogIndices = {};
                if (typeof app.renderedLogIndices[router.currentTerminalMode] === 'undefined') {
                    app.renderedLogIndices[router.currentTerminalMode] = 0;
                }

                const currentRenderedCount = app.renderedLogIndices[router.currentTerminalMode];

                // Optimization: only clear if source is actually reset/smaller and session is NOT completed
                // OR if it's a completely different session.
                // This prevents clearing logs when switching modes or when a scan completes and then new logs come in for a different mode.
                if (currentRenderedCount > logsSource.length && pipelineState.scanStatus !== 'COMPLETED') {
                    terminalBody.innerHTML = '';
                    app.renderedLogIndices[router.currentTerminalMode] = 0;
                }

                const unrenderedLogs = logsSource.slice(currentRenderedCount);

                const logsHTML = unrenderedLogs.map(log => {
                    const level = log.level || 'INFO';
                    const msg = (log.message || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const time = log.timestamp || '';
                    let color = 'text-emerald-400';
                    if (level === 'WARNING') color = 'text-amber-400';
                    if (level === 'ERROR') color = 'text-rose-500';
                    if (level === 'SUCCESS') color = 'text-blue-400';
                    return `<div class="mb-1.5 font-mono text-xs flex gap-3 leading-relaxed">
                        <span class="text-slate-700 shrink-0 font-bold w-[4rem]">[${time}]</span>
                        <span class="uppercase shrink-0 w-14 font-black text-[9px] ${color} opacity-80">${level}</span>
                        <span class="${color}">${msg}</span>
                    </div>`;
                }).join('');

                if (logsHTML) {
                    // Remove placeholder if present
                    if (terminalBody.querySelector('.animate-pulse')) {
                        terminalBody.innerHTML = '';
                    }

                    terminalBody.insertAdjacentHTML('beforeend', logsHTML);
                    app.renderedLogIndices[router.currentTerminalMode] = logsSource.length; // Update rendered count
                    terminalBody.scrollTop = terminalBody.scrollHeight; // Auto-scroll
                } else if (logsSource.length === 0) {
                    const placeholder = router.currentTerminalMode === 'scan'
                        ? '<div class="text-slate-700 animate-pulse font-bold tracking-widest">_ Awaiting scanner directives...</div>'
                        : '<div class="text-slate-700 animate-pulse font-bold tracking-widest">_ Awaiting automation kernel start...</div>';
                    terminalBody.innerHTML = placeholder;
                }

                // Detect all-done state in pipeline mode and show toast once
                if (router.currentTerminalMode === 'pipeline' && !this._pipelineDoneToastShown) {
                    const allDone = pipelineState.vulnerabilities.length > 0 &&
                        pipelineState.vulnerabilities.every(v => v.status === 'FIXED' || v.status === 'VALIDATED' || v.status === 'FAILED');
                    const noPipeline = !pipelineState.activeJob && pipelineState.queue && pipelineState.queue.length === 0;
                    if (allDone && noPipeline) {
                        this._pipelineDoneToastShown = true;
                        this.showToast('✅ All vulnerabilities processed. Pipeline complete!', 'emerald');
                    }
                }
                // Reset flag when new jobs come in
                if (pipelineState.activeJob || (pipelineState.queue && pipelineState.queue.length > 0)) {
                    this._pipelineDoneToastShown = false;
                }
            },

                toast.className = `fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] px-8 py-4 rounded-2xl glass border border-${c}-500/40 text-${c}-300 font-black text-sm shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center gap-3 transition-opacity duration-500 opacity-0`;
                toast.innerHTML = `<span class="w-3 h-3 rounded-full bg-${c}-500 animate-pulse"></span> <span>${message}</span>`;

            updateSystemDynamic(el) {

                    this.renderWebsiteScanner(el);

                    const stateHash = `${vuln.id}-${vuln.status}`;
